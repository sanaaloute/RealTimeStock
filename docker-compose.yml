services:
  api:
    build: .
    image: realtimestock-bot:latest
    command: python run_api.py
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - bot_data:/app/data
    restart: unless-stopped

  bot:
    build: .
    image: realtimestock-bot:latest
    env_file: .env
    environment:
      - BRVM_API_URL=http://api:8000
      - HTTP_PROXY=http://host.docker.internal:29758
      - HTTPS_PROXY=http://host.docker.internal:29758
    volumes:
      - bot_data:/app/data
    depends_on:
      - api
    restart: unless-stopped

  # Optional: run Ollama in Docker. Start with: docker compose up -d ollama
  # Then: docker compose exec ollama ollama pull qwen3:8b
  # In .env set: OLLAMA_BASE_URL=http://ollama:11434
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Uncomment to use GPU (nvidia)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  bot_data:
  ollama_data:
