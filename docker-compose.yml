# `docker compose up -d` starts the full stack: PostgreSQL + Chat API + Telegram bot
# (+ SGI broker data auto-bootstrapped into the shared volume by the image
# entrypoint — no manual `python run_sgi_fetch.py` step; refreshed when older than
# 7 days, tunable via SGI_REFRESH_DAYS).
#
# Data lives in PostgreSQL (user data + chat checkpoints) when DATABASE_URL is set
# (default here). To run on local SQLite instead, remove DATABASE_URL from both
# services; the bot_data volume then holds the .db files.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: brvm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brvm}
      POSTGRES_DB: brvm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brvm -d brvm"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: .
    image: realtimestock-bot:latest
    command: python run_api.py
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://brvm:${POSTGRES_PASSWORD:-brvm}@db:5432/brvm
    ports:
      - "8000:8000"
    volumes:
      - bot_data:/app/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build: .
    image: realtimestock-bot:latest
    env_file: .env
    environment:
      - BRVM_API_URL=http://api:8000
      - DATABASE_URL=postgresql://brvm:${POSTGRES_PASSWORD:-brvm}@db:5432/brvm
    volumes:
      - bot_data:/app/app/data
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy
    restart: unless-stopped

  # Optional: run Ollama in Docker. Start with: docker compose up -d ollama
  # Then: docker compose exec ollama ollama pull glm-5:cloud
  # In .env set: OLLAMA_BASE_URL=http://ollama:11434
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Uncomment to use GPU (nvidia)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  bot_data:
  postgres_data:
  ollama_data:
