# `docker compose up -d` starts the full stack: Chat API + Telegram bot (+ SGI
# broker data auto-bootstrapped into the shared volume by the image entrypoint —
# no manual `python run_sgi_fetch.py` step; refreshed when older than 7 days,
# tunable via SGI_REFRESH_DAYS).
services:
  api:
    build: .
    image: realtimestock-bot:latest
    command: python run_api.py
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - bot_data:/app/app/data
    restart: unless-stopped

  bot:
    build: .
    image: realtimestock-bot:latest
    env_file: .env
    environment:
      - BRVM_API_URL=http://api:8000
    volumes:
      - bot_data:/app/app/data
    depends_on:
      - api
    restart: unless-stopped

  # Optional: run Ollama in Docker. Start with: docker compose up -d ollama
  # Then: docker compose exec ollama ollama pull glm-5:cloud
  # In .env set: OLLAMA_BASE_URL=http://ollama:11434
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Uncomment to use GPU (nvidia)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  bot_data:
  ollama_data:
